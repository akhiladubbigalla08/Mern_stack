<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container{
            display: grid;
            grid-template-columns: 250px 50px 40px;
            grid-template-rows: 50px 50px 50px;
            gap: 10px;
        }
        
        #box1{
            grid-column:1/5;
            grid-row:1/1;

        }
         #box2{
            grid-column:12;
            grid-row:2/4;
        }
         #box3{
            grid-column:2/6;
            grid-row:2/3;
        }
         #box4{
            grid-column:2/6;
            grid-row:3/4;
        }

        #box5{
            grid-column:1/6;
            grid-row-end: 4/5;

        }
        #box6{
            grid-column:1/6;
            grid-row:5/6;
        }
        .grid-container .box{

            border: 1px solid red;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="box" id="box1">box1</div>
        <div class="box" >box2</div>
        <div class="box">box3</div>
        <div class="box" id="box4">box4</div>
        <div class="box">box5</div>
        <div class="box">box6</div>
    </div>
    
</body>
</html>
