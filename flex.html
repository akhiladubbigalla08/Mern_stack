<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container{
            background-color: aqua;
            display: flex;
            flex-direction: row;
            height:100vh;
            justify-content: center;
            align-items: center;
                }
        .container .box{
            height: 140px;
            width: 160px;
            background-color: peachpuff;
            border: 3px solid red;
        }
        .navbar {
            display: flex;
            justify-content: space-around;
            border-color: chartreuse;
            padding:10px 20px;
        }
        .nav-links {
    display: flex;
    gap: 20px;
}

.navbar a {
    color: white;
    text-decoration: none;
}

.navbar a:hover {
    color: yellow;
}
        
    </style>
</head>
<body>
    <h1>flex box example</h1>
    <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div></div>
    </body>
</html>
